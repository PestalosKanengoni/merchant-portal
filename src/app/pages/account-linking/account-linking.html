  <div class="card">
    <div class="card-header">
      <h2>Link New Account</h2>
      <p class="subtitle">Add a new account to your merchant profile</p>
    </div>

    <div class="card-body">
      <!-- Success Message -->
      <div *ngIf="successMessage" class="alert alert-success">
        <i class="icon-check"></i>
        {{ successMessage }}
        <button class="close-btn" (click)="clearMessages()">&times;</button>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="alert alert-error">
        <i class="icon-error"></i>
        {{ errorMessage }}
        <button class="close-btn" (click)="clearMessages()">&times;</button>
      </div>

      <!-- Link Account Form -->
      <form [formGroup]="linkAccountForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="account">Account Number</label>
          <input
            type="text"
            id="account"
            formControlName="account"
            class="form-control"
            placeholder="Enter account number or phone number"
            [class.error]="account?.invalid && account?.touched"
          />

          <!-- Validation Messages -->
          <div *ngIf="account?.invalid && account?.touched" class="error-message">
            <span *ngIf="account?.errors?.['required']">Account is required</span>
            <span *ngIf="account?.errors?.['minlength']">
              Account must be at least 3 characters
            </span>
          </div>
        </div>

        <div class="form-actions">
          <button
            type="submit"
            class="btn btn-outline-success btn-sm"
            [disabled]="linkAccountForm.invalid || isLoading"
          >
            <span *ngIf="!isLoading">Link Account</span>
            <span *ngIf="isLoading">
              <i class="spinner"></i> Linking...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
